name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install PyQt5
    
    - name: List files
      run: |
        dir
        dir assets
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --version
        pyinstaller build.spec --clean --noconfirm --log-level=DEBUG
      env:
        PYTHONIOENCODING: utf-8
    
    - name: Check output
      run: |
        dir dist
        dir "dist\小赫桌面宠物"
      shell: cmd
    
    - name: Create ZIP archive
      if: success()
      run: |
        Compress-Archive -Path "dist/小赫桌面宠物/*" -DestinationPath "小赫桌面宠物.zip"
    
    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: hermes-desktop-pet
        path: 小赫桌面宠物.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: softprops/action-gh-release@v1
      with:
        files: 小赫桌面宠物.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/
          *.log
